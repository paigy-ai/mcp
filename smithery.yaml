build:
  dockerBuildPath: .
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      paigyAgent:
        type: string
        description: >-
          Label shown on Paigy notifications for this agent (e.g. "codex",
          "local-model"). Optional — defaults to "mcp-agent".
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@paigy/mcp@latest'],
      env: config.paigyAgent ? { PAIGY_AGENT: config.paigyAgent } : {}
    })
